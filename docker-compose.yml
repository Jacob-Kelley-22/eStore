services:
  postgres:
    image: postgres:16
    container_name: eStore-postgres
    environment:
      POSTGRES_DB: estore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d estore"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
    container_name: eStore-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://postgres:5432/estore
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: your-super-secure-jwt-secret-key-that-is-at-least-32-chars
      JWT_EXPIRATION: 86400000
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health | grep UP"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8081
    container_name: eStore-frontend
    depends_on:
      app:
        condition: service_started
    ports:
      - "3000:80"

volumes:
  postgres_data: